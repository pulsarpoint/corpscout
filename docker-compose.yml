services:
  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_DB: corpscout
  #     POSTGRES_USER: corpscout
  #     POSTGRES_PASSWORD: corpscout
  #   ports:
  #     - "5435:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U corpscout -d corpscout"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 10

  migrate:
    image: migrate/migrate:v4.17.0
    extra_hosts:
      - "companycollect:100.85.212.113"
    volumes:
      - ./database/migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://corpscout:password123@companycollect:5432/corpscout?sslmode=disable"
      - "up"

  postgrest:
    image: postgrest/postgrest:v12.2.3
    extra_hosts:
      - "companycollect:100.85.212.113"
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      PGRST_DB_URI: postgres://corpscout:password123@companycollect:5432/corpscout?sslmode=disable
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: corpscout_anon
      PGRST_DB_POOL: "5"
      PGRST_SERVER_PORT: "3000"
    restart: unless-stopped

  rustfs:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_ACCESS_KEY: corpscout
      RUSTFS_SECRET_KEY: corpscout123
      RUSTFS_VOLUMES: /data
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/rustfs:/data

  scheduler:
    build: ./scheduler
    extra_hosts:
      - "companycollect:100.85.212.113"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgrest:
        condition: service_started
    environment:
      DATABASE_URL: postgres://corpscout:password123@companycollect:5432/corpscout?sslmode=disable
      CORPSCOUT_CRAWLER_URL: http://crawler:8000
      CORPSCOUT_DOMAIN_CONCURRENCY: "3"
      CORPSCOUT_POSTGREST_URL: http://postgrest:3000
      CORPSCOUT_S3_ENDPOINT: http://rustfs:9000
      CORPSCOUT_S3_ACCESS_KEY: corpscout
      CORPSCOUT_S3_SECRET_KEY: corpscout123
      CORPSCOUT_S3_BUCKET: crawls
      CORPSCOUT_TEMPORAL_HOST: companycollect:7233
      CORPSCOUT_TEMPORAL_UI_URL: http://100.85.212.113:8089
    ports:
      - "8092:8090"
    restart: unless-stopped

  crawler:
    build: ./crawler
    environment:
      CRAWLER_OPENAI_API_KEY: ${CRAWLER_OPENAI_API_KEY:-}
      CRAWLER_OPENCORPORATES_API_KEY: ${CRAWLER_OPENCORPORATES_API_KEY:-}
      COMPANIES_HOUSE_API_KEY: ${COMPANIES_HOUSE_API_KEY:-}
      CVR_API_TOKEN: ${CVR_API_TOKEN:-}
    ports:
      - "8093:8000"
    restart: unless-stopped

  ui:
    build: ./ui
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8094:80"
    restart: unless-stopped

