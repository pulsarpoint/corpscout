services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: corpscout
      POSTGRES_USER: corpscout
      POSTGRES_PASSWORD: corpscout
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corpscout -d corpscout"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: migrate/migrate:v4.17.0
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./database/migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://corpscout:corpscout@postgres:5432/corpscout?sslmode=disable"
      - "up"

  postgrest:
    image: postgrest/postgrest:v12.2.3
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      PGRST_DB_URI: postgres://corpscout:corpscout@postgres:5432/corpscout?sslmode=disable
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: corpscout_anon
      PGRST_DB_POOL: "5"
      PGRST_SERVER_PORT: "3000"
    restart: unless-stopped

  scheduler:
    build: ./scheduler
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgrest:
        condition: service_started
    environment:
      DATABASE_URL: postgres://corpscout:corpscout@postgres:5432/corpscout?sslmode=disable
      CORPSCOUT_CRAWLER_URL: http://crawler:8000
      CORPSCOUT_DOMAIN_CONCURRENCY: "3"
      CORPSCOUT_POSTGREST_URL: http://postgrest:3000
    ports:
      - "8092:8090"
    restart: unless-stopped

  crawler:
    build: ./crawler
    environment:
      CRAWLER_OPENAI_API_KEY: ${CRAWLER_OPENAI_API_KEY:-}
      CRAWLER_OPENCORPORATES_API_KEY: ${CRAWLER_OPENCORPORATES_API_KEY:-}
      COMPANIES_HOUSE_API_KEY: ${COMPANIES_HOUSE_API_KEY:-}
      CVR_API_TOKEN: ${CVR_API_TOKEN:-}
    ports:
      - "8093:8000"
    restart: unless-stopped

  ui:
    build: ./ui
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8094:80"
    restart: unless-stopped

volumes:
  postgres_data:
