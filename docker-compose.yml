services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: corpscout
      POSTGRES_USER: corpscout
      POSTGRES_PASSWORD: corpscout
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corpscout -d corpscout"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: migrate/migrate:v4.17.0
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./database/migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://corpscout:corpscout@postgres:5432/corpscout?sslmode=disable"
      - "up"

  scheduler:
    build: ./scheduler
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://corpscout:corpscout@postgres:5432/corpscout?sslmode=disable
      CORPSCOUT_CRAWLER_URL: http://crawler:8000
    ports:
      - "8092:8090"
    restart: unless-stopped

  crawler:
    build: ./crawler
    environment:
      CRAWLER_OPENAI_API_KEY: ${CRAWLER_OPENAI_API_KEY:-}
      CRAWLER_OPENCORPORATES_API_KEY: ${CRAWLER_OPENCORPORATES_API_KEY:-}
    ports:
      - "8093:8000"
    restart: unless-stopped

volumes:
  postgres_data:
